<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INKU — Anime & Manga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#D02886;--violet:#54218E;--pink:#FF3399;--pink2:#FF5FB3;--purple2:#9966CC;
  --grad:linear-gradient(135deg,#D02886 0%,#54218E 100%);
  --grad2:linear-gradient(135deg,#FF3399 0%,#54218E 100%);
  --grad3:linear-gradient(135deg,#FF5FB3 0%,#9966CC 100%);
  --bg:#08080F;--bg2:#0F0F1A;--card:#141420;--elev:#1A1A2E;
  --t:#F8F8FC;--t2:#B8B8D4;--t3:#6B6B9C;
  --brd:rgba(208,40,134,.18);--r:14px;
}
[data-theme=light]{
  --bg:#F5F5FA;--bg2:#EEEEF6;--card:#fff;--elev:#E6E6F4;
  --t:#0D0D1A;--t2:#4A4A6A;--t3:#9090B0;--brd:rgba(84,33,142,.13);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);cursor:none;transition:background .4s,color .4s;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;}

/* CURSOR */
#cdot,#cring{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;}
#cdot{width:9px;height:9px;background:var(--pink);top:-5px;left:-5px;}
#cring{width:40px;height:40px;border:2px solid rgba(208,40,134,.7);top:-20px;left:-20px;transition:width .25s,height .25s,top .25s,left .25s,border-color .25s;}
#cring.hover{width:56px;height:56px;top:-28px;left:-28px;border-color:var(--pink);}
@media(hover:none){#cdot,#cring{display:none;}body{cursor:auto;}}

/* READING PROGRESS */
#progress{position:fixed;top:0;left:0;height:3px;width:0%;background:var(--grad2);z-index:2000;transition:width .1s;display:none;}

/* TYPOGRAPHY */
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif;line-height:1.15;}
.gt{background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 11px;border-radius:50px;font-family:'Space Grotesk',sans-serif;}
.tag-news{background:rgba(208,40,134,.18);color:#e060b0;}
.tag-review{background:rgba(84,33,142,.22);color:#a070e0;}
.tag-top{background:rgba(255,51,153,.15);color:#ff5faa;}
.tag-analyse{background:rgba(255,95,179,.15);color:#ff80c0;}
.tag-guide{background:rgba(17,153,142,.15);color:#30c8b8;}

/* PAGE TRANSITIONS */
#app{animation:pageIn .35s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:1000;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;transition:background .3s,border .3s;}
header.scrolled{background:rgba(8,8,15,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--brd);}
[data-theme=light] header.scrolled{background:rgba(245,245,250,.92);}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:none;}
nav{display:flex;gap:4px;}
nav a{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--t2);transition:color .2s,background .2s;position:relative;cursor:none;}
nav a::after{content:'';position:absolute;bottom:4px;left:14px;right:14px;height:2px;background:var(--grad2);border-radius:2px;transform:scaleX(0);transition:transform .2s;}
nav a:hover,nav a.active{color:var(--t);}
nav a:hover::after,nav a.active::after{transform:scaleX(1);}
.hactions{display:flex;align-items:center;gap:10px;}
.ibtn{background:none;border:none;cursor:none;color:var(--t2);padding:8px;border-radius:8px;font-size:19px;transition:color .2s,background .2s;}
.ibtn:hover{color:var(--t);background:var(--elev);}
.tbtn{width:50px;height:26px;border-radius:50px;background:var(--elev);border:1px solid var(--brd);position:relative;cursor:none;transition:background .3s;}
.tbtn::after{content:'🌙';position:absolute;top:1px;left:1px;width:22px;height:22px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;transition:transform .3s;}
[data-theme=light] .tbtn::after{content:'☀️';transform:translateX(24px);}
.hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:4px;}
.hbg span{width:22px;height:2px;background:var(--t);border-radius:2px;transition:all .3s;display:block;}

/* MOBILE MENU */
.mmenu{position:fixed;inset:0;z-index:999;background:rgba(8,8,15,.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transform:translateX(100%);transition:transform .4s cubic-bezier(.25,.46,.45,.94);}
.mmenu.open{transform:translateX(0);}
.mmenu a{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;cursor:none;transition:color .2s;}
.mmenu a:hover{color:var(--pink2);}
.xbtn{position:absolute;top:22px;right:24px;background:none;border:none;cursor:none;color:var(--t);font-size:26px;}

/* CONTAINER */
.wrap{max-width:1240px;margin:0 auto;padding:0 32px;}
section{padding:80px 0;}
.sh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:44px;}
.stitle{font-size:clamp(24px,3vw,34px);font-weight:700;}
.stitle small{display:block;font-size:13px;font-weight:400;color:var(--t3);margin-top:5px;font-family:'Inter',sans-serif;}
.seeall{font-size:13px;font-weight:600;color:var(--rose);display:flex;align-items:center;gap:5px;cursor:none;transition:gap .2s;font-family:'Space Grotesk',sans-serif;}
.seeall:hover{gap:9px;}

/* REVEAL */
.rv{opacity:0;transform:translateY(22px);transition:opacity .65s,transform .65s;}
.rv.on{opacity:1;transform:none;}
.rv:nth-child(2){transition-delay:.08s;}.rv:nth-child(3){transition-delay:.13s;}.rv:nth-child(4){transition-delay:.18s;}.rv:nth-child(5){transition-delay:.23s;}.rv:nth-child(6){transition-delay:.28s;}

/* ===== HOME — HERO ===== */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:120px 40px 80px;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 65% 50%,rgba(84,33,142,.38) 0%,transparent 60%),radial-gradient(ellipse at 20% 75%,rgba(208,40,134,.22) 0%,transparent 50%),var(--bg);}
[data-theme=light] .hero-bg{background:radial-gradient(ellipse at 65% 50%,rgba(84,33,142,.1) 0%,transparent 60%),radial-gradient(ellipse at 20% 75%,rgba(208,40,134,.07) 0%,transparent 50%),var(--bg);}
.orb{position:absolute;border-radius:50%;pointer-events:none;animation:floatO 11s ease-in-out infinite;}
.o1{width:650px;height:650px;background:radial-gradient(circle,rgba(84,33,142,.45),transparent 70%);top:-220px;right:-100px;filter:blur(50px);}
.o2{width:400px;height:400px;background:radial-gradient(circle,rgba(208,40,134,.3),transparent 70%);bottom:-80px;left:60px;filter:blur(60px);animation-delay:-5s;}
.o3{width:280px;height:280px;background:radial-gradient(circle,rgba(255,51,153,.2),transparent 70%);top:35%;right:28%;filter:blur(55px);animation-delay:-3s;}
@keyframes floatO{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(22px,-32px) scale(1.05);}66%{transform:translate(-18px,22px) scale(.95);}}
#pts{position:absolute;inset:0;pointer-events:none;}
.pt{position:absolute;border-radius:50%;animation:ptA var(--d,8s) ease-in-out infinite;opacity:0;}
@keyframes ptA{0%{opacity:0;transform:translate(0,0) scale(0);}20%{opacity:var(--op,.5);transform:scale(1);}80%{opacity:var(--op,.5);}100%{opacity:0;transform:translate(var(--tx,30px),var(--ty,-70px)) scale(0);}}
.hero-content{position:relative;z-index:2;max-width:660px;}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(208,40,134,.12);border:1px solid rgba(208,40,134,.3);border-radius:50px;padding:6px 16px;font-size:13px;font-weight:600;color:var(--pink2);margin-bottom:26px;font-family:'Space Grotesk',sans-serif;animation:fU .8s ease both;}
.hbadge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pink);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(255,51,153,.6);}50%{box-shadow:0 0 0 6px rgba(255,51,153,0);}}
.hero h1{font-size:clamp(44px,6vw,80px);font-weight:700;line-height:1.04;margin-bottom:22px;animation:fU .8s .1s ease both;}
.hero p{font-size:18px;color:var(--t2);line-height:1.72;max-width:510px;margin-bottom:38px;animation:fU .8s .2s ease both;}
.hbtns{display:flex;gap:14px;flex-wrap:wrap;animation:fU .8s .3s ease both;}
.btnp{display:inline-flex;align-items:center;gap:8px;background:var(--grad2);color:#fff;border:none;cursor:none;padding:13px 26px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(208,40,134,.4);}
.btnp:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(208,40,134,.6);}
.btns{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--t);padding:12px 25px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;border:none;cursor:none;position:relative;transition:transform .2s;}
.btns::before{content:'';position:absolute;inset:0;border-radius:50px;padding:2px;background:var(--grad2);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
.btns:hover{transform:translateY(-2px);}
.hvisual{position:absolute;right:7%;top:50%;transform:translateY(-50%);width:380px;height:380px;z-index:1;animation:fU 1s .4s ease both;}
.hvring{width:100%;height:100%;border-radius:50%;border:1px solid rgba(208,40,134,.2);display:flex;align-items:center;justify-content:center;animation:spin 22s linear infinite;}
.hvring2{width:72%;height:72%;border-radius:50%;border:1px solid rgba(84,33,142,.3);display:flex;align-items:center;justify-content:center;animation:spin 16s linear infinite reverse;}
.hvcore{width:55%;height:55%;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;color:#fff;-webkit-text-fill-color:#fff;animation:glow 3s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes glow{0%,100%{box-shadow:0 0 40px rgba(208,40,134,.5);}50%{box-shadow:0 0 80px rgba(208,40,134,.8),0 0 140px rgba(84,33,142,.5);}}
@keyframes fU{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
.scrollhint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--t3);font-size:11px;letter-spacing:.12em;text-transform:uppercase;}
.scrollhint::after{content:'';width:1px;height:36px;background:linear-gradient(to bottom,var(--rose),transparent);animation:sline 1.5s ease-in-out infinite;}
@keyframes sline{0%,100%{opacity:1;}50%{opacity:.2;}}

/* TICKER */
.ticker{background:var(--grad2);padding:11px 0;overflow:hidden;position:relative;z-index:5;}
.tlabel{position:absolute;left:0;top:0;bottom:0;background:var(--violet);display:flex;align-items:center;padding:0 18px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.15em;text-transform:uppercase;z-index:2;white-space:nowrap;}
.tlabel::after{content:'';position:absolute;right:-18px;top:0;bottom:0;width:18px;background:linear-gradient(to right,var(--violet),transparent);}
.tinner{display:flex;gap:56px;animation:tick 40s linear infinite;padding-left:180px;white-space:nowrap;}
.tinner:hover{animation-play-state:paused;}
.ti{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:#fff;font-family:'Space Grotesk',sans-serif;}
.ti::before{content:'⚡';font-size:13px;}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ===== HOME — EDITORIAL HERO ===== */
#editorial{background:var(--bg2);}
.ed-hero{position:relative;height:500px;border-radius:20px;overflow:hidden;cursor:none;display:block;transition:transform .3s;}
.ed-hero:hover{transform:translateY(-4px);}
.ed-hero .bg{position:absolute;inset:0;transition:transform .5s;}
.ed-hero:hover .bg{transform:scale(1.03);}
.ed-hero .ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,3,10,.97) 0%,rgba(3,3,10,.45) 55%,transparent 100%);}
.ed-hero .cnt{position:absolute;bottom:0;left:0;right:0;padding:40px;}
.ed-hero .cnt .tag{margin-bottom:14px;}
.ed-hero h2{font-size:clamp(26px,3vw,42px);color:#fff;-webkit-text-fill-color:#fff;margin-bottom:14px;max-width:680px;line-height:1.2;}
.ed-hero .xrp{font-size:15px;color:rgba(255,255,255,.7);max-width:560px;line-height:1.6;margin-bottom:18px;}
.ed-hero .meta{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,.55);}
.ed-hero .meta .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;flex-shrink:0;}

/* LATEST STRIP */
.lstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:20px;}
.ls-card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--brd);cursor:none;display:block;transition:transform .25s,border-color .25s,box-shadow .25s;}
.ls-card:hover{transform:translateY(-4px);border-color:rgba(208,40,134,.35);box-shadow:0 12px 36px rgba(208,40,134,.12);}
.ls-thumb{height:110px;overflow:hidden;}
.ls-thumb div{height:100%;transition:transform .4s;}
.ls-card:hover .ls-thumb div{transform:scale(1.07);}
.ls-body{padding:12px;}
.ls-body .tag{margin-bottom:7px;}
.ls-body h4{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ls-body .mt{font-size:11px;color:var(--t3);margin-top:7px;}

/* MAIN + SIDEBAR */
.ms-grid{display:grid;grid-template-columns:1fr 340px;gap:32px;margin-top:56px;}
.feat-grid{display:grid;grid-template-columns:1.2fr 1fr;grid-template-rows:auto auto;gap:18px;}
.fg-main{grid-row:1/-1;background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);cursor:none;display:block;transition:transform .3s,box-shadow .3s,border-color .3s;}
.fg-main:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(208,40,134,.14);border-color:rgba(208,40,134,.35);}
.fg-main .thumb{height:220px;overflow:hidden;}
.fg-main .thumb div{height:100%;transition:transform .5s;}
.fg-main:hover .thumb div{transform:scale(1.06);}
.fg-main .body{padding:20px;}
.fg-main h3{font-size:18px;font-weight:700;line-height:1.35;margin:10px 0 10px;}
.fg-main .exc{font-size:14px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;}
.fg-main .mt{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3);}
.fg-main .mt .av{width:24px;height:24px;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;}
.fg-small{background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);cursor:none;display:block;display:flex;gap:14px;padding:14px;transition:transform .25s,border-color .25s;}
.fg-small:hover{transform:translateX(5px);border-color:rgba(208,40,134,.35);}
.fg-small .sthumb{width:90px;height:90px;border-radius:10px;overflow:hidden;flex-shrink:0;}
.fg-small .sthumb div{width:100%;height:100%;transition:transform .4s;}
.fg-small:hover .sthumb div{transform:scale(1.08);}
.fg-small .sbody h4{font-size:14px;font-weight:600;line-height:1.4;margin:6px 0 7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.fg-small .sbody .mt{font-size:11px;color:var(--t3);}

/* SIDEBAR */
.sidebar{}
.sb-news{background:var(--card);border-radius:var(--r);border:1px solid var(--brd);overflow:hidden;}
.sb-news h4{padding:16px 20px;border-bottom:1px solid var(--brd);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);font-family:'Space Grotesk',sans-serif;}
.sb-item{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--brd);cursor:none;transition:background .2s;display:block;}
.sb-item:last-child{border-bottom:none;}
.sb-item:hover{background:var(--elev);}
.sb-item .tag{margin-bottom:6px;}
.sb-item p{font-size:13px;font-weight:600;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sb-item .mt{font-size:11px;color:var(--t3);margin-top:5px;}

/* ===== ARTICLE GRID ===== */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.acard{background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);cursor:none;display:block;transition:transform .3s,box-shadow .3s,border-color .3s;}
.acard:hover{transform:translateY(-5px);box-shadow:0 18px 48px rgba(208,40,134,.13);border-color:rgba(208,40,134,.35);}
.ac-thumb{height:190px;overflow:hidden;position:relative;}
.ac-thumb div{height:100%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:900;color:rgba(255,255,255,.12);letter-spacing:-3px;transition:transform .5s;}
.acard:hover .ac-thumb div{transform:scale(1.07);}
.ac-tag{position:absolute;top:12px;left:12px;}
.ac-body{padding:18px;}
.ac-title{font-size:16px;font-weight:600;line-height:1.4;margin:9px 0 9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ac-exc{font-size:13px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;}
.ac-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3);}
.ac-meta .av{width:26px;height:26px;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;flex-shrink:0;}
.ac-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--t3);}
.ac-meta .rt{margin-left:auto;}

/* MANGA GUIDE BANNER */
.mg-banner{background:var(--grad);border-radius:20px;padding:48px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative;cursor:none;transition:transform .3s,box-shadow .3s;margin-bottom:80px;}
.mg-banner:hover{transform:translateY(-3px);box-shadow:0 20px 60px rgba(208,40,134,.35);}
.mg-banner::before{content:'';position:absolute;right:-60px;top:-60px;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,.05);}
.mg-banner::after{content:'';position:absolute;right:80px;bottom:-80px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);}
.mg-banner .left h2{font-size:clamp(22px,3vw,32px);color:#fff;-webkit-text-fill-color:#fff;margin-bottom:10px;}
.mg-banner .left p{color:rgba(255,255,255,.8);font-size:15px;max-width:420px;line-height:1.6;}
.mg-banner .right{z-index:1;flex-shrink:0;}

/* CALENDRIER */
#cal{background:var(--bg2);}
.stabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.stab{padding:8px 20px;border-radius:50px;font-size:13px;font-weight:600;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:none;transition:all .2s;font-family:'Space Grotesk',sans-serif;}
.stab.on{background:var(--grad2);border-color:transparent;color:#fff;}
.stab:not(.on):hover{border-color:var(--rose);color:var(--t);}
.cscroll{overflow-x:auto;padding-bottom:12px;}
.cscroll::-webkit-scrollbar{height:4px;}
.cscroll::-webkit-scrollbar-track{background:var(--elev);border-radius:4px;}
.cscroll::-webkit-scrollbar-thumb{background:var(--grad);border-radius:4px;}
.cgrid{display:flex;gap:18px;width:max-content;padding:4px 2px;}

/* ===================== DATA ===================== */
const ARTICLES = {
  'solo-leveling-s2':{
    slug:'solo-leveling-s2',
    title:'Solo Leveling Saison 2 : Notre review complète des 12 épisodes',
    subtitle:'A-1 Pictures frappe encore plus fort avec une deuxième saison qui élève le standard de l\'anime d\'action',
    tag:'Review',tagClass:'tag-review',
    author:'Yuki Tanaka',authorInitials:'YT',authorGrad:'linear-gradient(135deg,#667eea,#764ba2)',
    authorBio:'Rédacteur en chef chez INKU. Passionné d\'anime depuis 15 ans, spécialiste des adaptations de manhwa et des productions A-1 Pictures.',

    grad:'linear-gradient(160deg,#1a0533,#3d0a6e,#8b1fa2,#D02886)',
    letter:'SL',score:9.2,
    excerpt:'A-1 Pictures livre une saison encore plus ambitieuse, avec des combats ahurissants et une montée en puissance de Sung Jinwoo qui tient toutes ses promesses.',
    content:`
      <p class="lead">La première saison de Solo Leveling avait posé les bases d'une adaptation solide du célèbre manhwa coréen. Avec cette saison 2, sobrement sous-titrée "Arise from the Shadow", A-1 Pictures prouve qu'il avait gardé le meilleur pour la fin.</p>
      <h2>Une progression narrative parfaitement rythmée</h2>
      <p>L'arc du Château du Roi Démon constitue le cœur de cette saison, et quel cœur. Les douze épisodes se dévorent avec une fluidité remarquable, alternant entre des séquences d'action ahurissantes et des moments d'introspection qui donnent davantage de profondeur au protagoniste. Là où la saison 1 pouvait parfois sembler répétitive dans sa formule "donjon, combat, montée de niveau", la saison 2 élargit considérablement le champ des possibles.</p>
      <p>La narration prend le temps de développer l'armée d'ombres de Jinwoo, donnant une véritable personnalité à des entités qui auraient pu rester de simples outils. Igris, Tank, Beru — chacun acquiert une dimension émotionnelle inattendue qui enrichit considérablement les enjeux.</p>
      <blockquote>"Solo Leveling Saison 2 ne se contente pas de répéter la formule de la première saison — elle la transcende, en offrant un spectacle qui rivalise avec les meilleures productions du genre."</blockquote>
      <h2>Des combats qui redéfinissent le standard</h2>
      <p>Si la saison 1 avait quelques moments mémorables, la saison 2 fracasse littéralement la barre. Le combat contre le Seigneur Démon Baran (épisode 7) restera dans les annales de l'anime d'action : une chorégraphie d'une fluidité absolue, une bande-son de Hiroyuki Sawano qui pulse dans chaque scène, et une direction artistique qui n'a rien à envier aux meilleures productions Ufotable.</p>
      <p>Les effets de particules, les impacts de coups, les transitions entre les pouvoirs de l'ombre — tout est exécuté avec une précision qui témoigne d'un budget et d'un soin de production considérables. Les animateurs assignés aux scènes clés ont visiblement donné le meilleur d'eux-mêmes.</p>
      <h2>Quelques réserves mineures</h2>
      <p>Rien n'est parfait. Certains épisodes de transition (notamment les épisodes 4 et 8) souffrent d'une animation légèrement en retrait par rapport aux standards établis par les épisodes phares. Le rythme de développement des personnages secondaires reste également en deçà de ce qu'on pourrait espérer — Cha Hae-In notamment mérite clairement plus de temps d'écran.</p>`,

/* ===================== ROUTER ===================== */
function go(path) {
  window.location.hash = path;
}
function router() {
  const hash = window.location.hash.replace('#','') || '';
  const [page,...params] = hash.split('/');
  const app = document.getElementById('app');
  app.style.animation = 'none';
  app.offsetHeight;
  app.style.animation = '';
  updateNav(page);
  window.scrollTo(0,0);
  if(page === '') renderHome();
  else if(page === 'articles') renderArticles();
  else if(page === 'article') renderArticle(params[0]);
  else if(page === 'calendrier') renderCalendrier();
  else if(page === 'manga-guide') renderMangaGuide();
  else renderHome();
  renderFooter();
  initPage();
}
window.addEventListener('hashchange', router);
window.addEventListener('load', router);

function updateNav(page) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const map = {'':'nav-home','articles':'nav-articles','article':'nav-articles','calendrier':'nav-cal','manga-guide':'nav-manga'};
  const el = document.getElementById(map[page] || 'nav-home');
  if(el) el.classList.add('active');
}

function updateProgress() {
  const bar = document.getElementById('progress');
  if(bar.style.display==='none') return;
  const body = document.body, html = document.documentElement;
  const total = Math.max(body.scrollHeight,html.scrollHeight) - window.innerHeight;
  const pct = (window.scrollY/total)*100;
  bar.style.width = Math.min(pct,100)+'%';
}

/* ===================== INTERACTIVITY ===================== */
function initPage() {
  // Scroll reveal
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('on');});
  },{threshold:.08,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));

  // Cursor targets
  document.querySelectorAll('a,button,.acard,.ancard,.mgcard,.ccat,.ls-card,.fg-main,.fg-small,.sb-item,.rel-item,.ed-hero,.mg-banner').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.getElementById('cring').classList.add('hover'));
    el.addEventListener('mouseleave',()=>document.getElementById('cring').classList.remove('hover'));
  });

  // Season tabs
  document.querySelectorAll('.stab,.mf').forEach(tab=>{
    tab.addEventListener('click',function(){
      this.closest('.stabs,.mg-filters').querySelectorAll('.stab,.mf').forEach(t=>t.classList.remove('on'));
      this.classList.add('on');
    });
  });

  // Header scroll
  window.addEventListener('scroll',()=>{
    document.getElementById('hdr').classList.toggle('scrolled',window.scrollY>20);
  },{passive:true});
}

function initParticles() {
  const c=document.getElementById('pts'); if(!c) return;
  const colors=['#FF3399','#D02886','#9966CC','#FF5FB3'];
  for(let i=0;i<26;i++){
    const p=document.createElement('div');p.className='pt';
    const sz=Math.random()*4+2;
    const col=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col};box-shadow:0 0 ${sz*3}px ${col};--d:${(Math.random()*8+5).toFixed(1)}s;--tx:${(Math.random()*80-40).toFixed(0)}px;--ty:-${(Math.random()*100+40).toFixed(0)}px;--op:${(Math.random()*.5+.25).toFixed(2)};animation-delay:-${(Math.random()*10).toFixed(1)}s;`;
    c.appendChild(p);
  }
}

const cdot=document.getElementById('cdot'),cring=document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{

  cdot.style.transform=`translate(${mx-5}px,${my-5}px)`;
});
(function animR(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;cring.style.transform=`translate(${rx-20}px,${ry-20}px)`;requestAnimationFrame(animR);})();
