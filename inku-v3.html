<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INKU — Anime & Manga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#D02886;--violet:#54218E;--pink:#FF3399;--pink2:#FF5FB3;--pur2:#9966CC;
  --grad:linear-gradient(135deg,#D02886,#54218E);
  --grad2:linear-gradient(135deg,#FF3399,#54218E);
  --grad3:linear-gradient(135deg,#FF5FB3,#9966CC);
  --bg:#08080F;--bg2:#0E0E1A;--card:#131320;--elev:#1A1A2E;
  --t:#F0F0FC;--t2:#B0B0D0;--t3:#606080;--brd:rgba(208,40,134,.15);--r:14px;
}
[data-theme=light]{
  --bg:#F4F4FA;--bg2:#EBEBF5;--card:#fff;--elev:#E2E2F0;
  --t:#0A0A18;--t2:#444465;--t3:#8888AA;--brd:rgba(84,33,142,.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);cursor:none;transition:background .4s,color .4s;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
img{display:block;width:100%;height:100%;object-fit:cover;}

/* SPLASH */
.splash{position:fixed;inset:0;z-index:99999;background:#04040A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .7s ease;}
.splash.hide{opacity:0;pointer-events:none;}
.sp-logo{font-family:'Space Grotesk',sans-serif;font-size:88px;font-weight:700;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:spIn .9s ease both;letter-spacing:-2px;}
.sp-tag{font-size:15px;color:#6060A0;letter-spacing:.2em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;animation:spIn .9s .25s ease both;}
.sp-bar{width:80px;height:3px;background:#1A1A30;border-radius:3px;overflow:hidden;animation:spIn .9s .4s ease both;}
.sp-bar::after{content:'';display:block;height:100%;width:0;background:var(--grad2);animation:spLoad 1.8s .5s ease-in-out infinite;}
@keyframes spIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spLoad{0%{width:0;margin-left:0;}50%{width:100%;margin-left:0;}100%{width:0;margin-left:100%;}}

/* CURSOR */
#cd,#cr{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;}
#cd{width:9px;height:9px;background:var(--pink);top:-5px;left:-5px;}
#cr{width:40px;height:40px;border:2px solid rgba(208,40,134,.65);top:-20px;left:-20px;transition:width .22s,height .22s,top .22s,left .22s;}
#cr.h{width:58px;height:58px;top:-29px;left:-29px;border-color:var(--pink);}
@media(hover:none){#cd,#cr{display:none;}body{cursor:auto;}}

/* READING PROGRESS */
#prog{position:fixed;top:0;left:0;height:3px;width:0;background:var(--grad2);z-index:2000;transition:width .1s;display:none;}

/* TYPOGRAPHY */
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif;line-height:1.15;}
.gt{background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:50px;font-family:'Space Grotesk',sans-serif;}
.tag-news{background:rgba(208,40,134,.2);color:#e060b0;}
.tag-review{background:rgba(84,33,142,.25);color:#a07ae0;}
.tag-top{background:rgba(255,51,153,.15);color:#ff5faa;}
.tag-analyse{background:rgba(255,95,179,.15);color:#ff80c0;}
.tag-guide{background:rgba(17,153,142,.18);color:#30c8b8;}

/* PAGE ANIM */
#app{animation:pgIn .35s ease;}
@keyframes pgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:1000;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;transition:background .3s,border .3s;}
header.sc{background:rgba(8,8,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);}
[data-theme=light] header.sc{background:rgba(244,244,250,.92);}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:none;}
nav{display:flex;gap:4px;}
nav a{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--t2);transition:color .2s,background .2s;cursor:none;position:relative;}
nav a::after{content:'';position:absolute;bottom:4px;left:14px;right:14px;height:2px;background:var(--grad2);border-radius:2px;transform:scaleX(0);transition:transform .2s;}
nav a:hover,nav a.on{color:var(--t);}
nav a:hover::after,nav a.on::after{transform:scaleX(1);}
.hact{display:flex;align-items:center;gap:10px;}
.ibtn{background:none;border:none;cursor:none;color:var(--t2);padding:8px;border-radius:8px;font-size:19px;transition:color .2s,background .2s;}
.ibtn:hover{color:var(--t);background:var(--elev);}
.tbtn{width:50px;height:26px;border-radius:50px;background:var(--elev);border:1px solid var(--brd);position:relative;cursor:none;}
.tbtn::after{content:'🌙';position:absolute;top:1px;left:1px;width:22px;height:22px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;transition:transform .3s;}
[data-theme=light] .tbtn::after{content:'☀️';transform:translateX(24px);}
.hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:4px;}
.hbg span{width:22px;height:2px;background:var(--t);border-radius:2px;display:block;transition:all .3s;}

/* MOBILE MENU */
.mm{position:fixed;inset:0;z-index:999;background:rgba(4,4,10,.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transform:translateX(100%);transition:transform .4s cubic-bezier(.25,.46,.45,.94);}
.mm.open{transform:translateX(0);}
.mm a{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;cursor:none;transition:color .2s;}
.mm a:hover{color:var(--pink2);}
.xbtn{position:absolute;top:22px;right:24px;background:none;border:none;cursor:none;color:var(--t);font-size:26px;}

/* SKELETON */
.sk{background:linear-gradient(90deg,var(--elev) 25%,var(--card) 50%,var(--elev) 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:8px;}
@keyframes sk{from{background-position:200% 0;}to{background-position:-200% 0;}}

/* REVEAL */
.rv{opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;}
.rv.on{opacity:1;transform:none;}
.rv:nth-child(2){transition-delay:.07s;}.rv:nth-child(3){transition-delay:.12s;}.rv:nth-child(4){transition-delay:.17s;}.rv:nth-child(5){transition-delay:.22s;}.rv:nth-child(6){transition-delay:.27s;}

/* ======== HERO ======== */
.hero{height:100vh;min-height:600px;position:relative;overflow:hidden;display:flex;align-items:center;}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center 15%;transition:background-image .8s ease;animation:heroZ 12s ease-in-out infinite alternate;}
@keyframes heroZ{from{transform:scale(1);}to{transform:scale(1.06);}}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to right,rgba(4,4,12,.97) 0%,rgba(4,4,12,.8) 45%,rgba(4,4,12,.35) 75%,rgba(4,4,12,.2) 100%),linear-gradient(to top,rgba(4,4,12,.7) 0%,transparent 40%);}
[data-theme=light] .hero-ov{background:linear-gradient(to right,rgba(244,244,250,.98) 0%,rgba(244,244,250,.85) 45%,rgba(244,244,250,.5) 75%,rgba(244,244,250,.3) 100%),linear-gradient(to top,rgba(244,244,250,.6) 0%,transparent 40%);}
.hero-orbs{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;animation:orbF 12s ease-in-out infinite;}
.o1{width:600px;height:600px;background:radial-gradient(circle,rgba(84,33,142,.35),transparent 70%);top:-180px;right:-80px;filter:blur(50px);}
.o2{width:380px;height:380px;background:radial-gradient(circle,rgba(208,40,134,.25),transparent 70%);bottom:-60px;left:40%;filter:blur(60px);animation-delay:-5s;}
@keyframes orbF{0%,100%{transform:translate(0,0);}50%{transform:translate(15px,-25px);}}
#pts{position:absolute;inset:0;pointer-events:none;}
.pt{position:absolute;border-radius:50%;animation:ptA var(--d,8s) ease-in-out infinite;opacity:0;}
@keyframes ptA{0%{opacity:0;transform:scale(0);}20%{opacity:var(--op,.5);transform:scale(1);}80%{opacity:var(--op,.5);}100%{opacity:0;transform:translate(var(--tx,20px),var(--ty,-60px)) scale(0);}}
.hero-cnt{position:relative;z-index:2;padding:0 40px;max-width:700px;}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(208,40,134,.12);border:1px solid rgba(208,40,134,.3);border-radius:50px;padding:6px 16px;font-size:13px;font-weight:600;color:var(--pink2);margin-bottom:26px;font-family:'Space Grotesk',sans-serif;animation:fU .8s ease both;}
.hbadge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pink);animation:bl 2s ease-in-out infinite;}
@keyframes bl{0%,100%{box-shadow:0 0 0 0 rgba(255,51,153,.6);}50%{box-shadow:0 0 0 6px rgba(255,51,153,0);}}
.hero h1{font-size:clamp(46px,6.5vw,86px);font-weight:700;line-height:1.03;margin-bottom:20px;animation:fU .8s .1s ease both;}
.hero p{font-size:18px;color:var(--t2);line-height:1.72;max-width:500px;margin-bottom:36px;animation:fU .8s .2s ease both;}
.hbtns{display:flex;gap:14px;flex-wrap:wrap;animation:fU .8s .3s ease both;}
.btnp{display:inline-flex;align-items:center;gap:8px;background:var(--grad2);color:#fff;border:none;cursor:none;padding:14px 28px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;box-shadow:0 4px 24px rgba(208,40,134,.4);transition:transform .2s,box-shadow .2s;}
.btnp:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(208,40,134,.65);}
.btns{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);color:var(--t);padding:13px 26px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;border:1px solid rgba(255,255,255,.15);cursor:none;transition:background .2s,transform .2s;backdrop-filter:blur(8px);}
.btns:hover{background:rgba(255,255,255,.14);transform:translateY(-2px);}

/* Hero featured anime row */
.hero-anime-row{position:absolute;right:40px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:3;animation:fU 1s .5s ease both;}
.ha-card{width:130px;height:190px;border-radius:12px;overflow:hidden;position:relative;cursor:none;transition:transform .3s;border:1px solid rgba(255,255,255,.1);}
.ha-card:hover{transform:translateX(-6px) scale(1.04);}
.ha-card img{object-position:top;}
.ha-card .ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%);}
.ha-card .ht{position:absolute;bottom:8px;left:8px;right:8px;font-size:10px;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;line-height:1.3;}
.ha-card:nth-child(2){transform:translateX(16px);}
.ha-card:nth-child(2):hover{transform:translateX(10px) scale(1.04);}

.scrollhint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.15em;text-transform:uppercase;z-index:2;}
.scrollhint::after{content:'';width:1px;height:34px;background:linear-gradient(to bottom,var(--rose),transparent);animation:sl 1.5s ease-in-out infinite;}
@keyframes sl{0%,100%{opacity:1;}50%{opacity:.2;}}
@keyframes fU{from{opacity:0;transform:translateY(26px);}to{opacity:1;transform:translateY(0);}}

/* TICKER */
.ticker{background:var(--grad2);padding:11px 0;overflow:hidden;position:relative;z-index:5;}
.tl{position:absolute;left:0;top:0;bottom:0;background:var(--violet);display:flex;align-items:center;padding:0 18px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.15em;text-transform:uppercase;z-index:2;white-space:nowrap;}
.tl::after{content:'';position:absolute;right:-16px;top:0;bottom:0;width:16px;background:linear-gradient(to right,var(--violet),transparent);}
.ti2{display:flex;gap:56px;animation:tk 40s linear infinite;padding-left:180px;white-space:nowrap;}
.ti2:hover{animation-play-state:paused;}
.ti2 span{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:#fff;font-family:'Space Grotesk',sans-serif;}
.ti2 span::before{content:'⚡';}
@keyframes tk{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* WRAP & LAYOUT */
.wrap{max-width:1240px;margin:0 auto;padding:0 36px;}
section{padding:80px 0;}
.sh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:44px;}
.stitle{font-size:clamp(22px,3vw,32px);font-weight:700;}
.stitle small{display:block;font-size:13px;font-weight:400;color:var(--t3);margin-top:5px;font-family:'Inter',sans-serif;}
.seeall{font-size:13px;font-weight:600;color:var(--rose);display:flex;align-items:center;gap:5px;cursor:none;font-family:'Space Grotesk',sans-serif;transition:gap .2s;}
.seeall:hover{gap:9px;}

/* ======== EDITORIAL HERO CARD ======== */
.ed-hero{height:520px;border-radius:20px;overflow:hidden;position:relative;display:block;cursor:none;transition:transform .35s;}
.ed-hero:hover{transform:translateY(-4px);}
.ed-hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .6s;}
.ed-hero:hover .bg{transform:scale(1.03);}
.ed-hero .bg img{transition:transform .6s;}
.ed-hero:hover .bg img{transform:scale(1.03);}
.ed-hero .ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,3,10,.97) 0%,rgba(3,3,10,.5) 55%,transparent 100%);}
.ed-hero .cnt{position:absolute;bottom:0;left:0;right:0;padding:40px;}
.ed-hero .cnt .tag{margin-bottom:14px;}
.ed-hero h2{font-size:clamp(24px,3vw,40px);color:#fff;-webkit-text-fill-color:#fff;margin-bottom:12px;max-width:680px;line-height:1.2;}
.ed-hero .xrp{font-size:15px;color:rgba(255,255,255,.68);max-width:560px;line-height:1.6;margin-bottom:18px;}
.ed-hero .meta{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,.5);}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;font-family:'Space Grotesk',sans-serif;}

/* STRIP */
.lstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:20px;}
.ls{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--brd);cursor:none;display:block;transition:transform .25s,border-color .25s,box-shadow .25s;}
.ls:hover{transform:translateY(-4px);border-color:rgba(208,40,134,.35);box-shadow:0 12px 32px rgba(208,40,134,.1);}
.ls-img{height:108px;overflow:hidden;background:var(--elev);}
.ls-img img,.ls-img div{height:100%;width:100%;transition:transform .4s;background-size:cover;background-position:top;}
.ls:hover .ls-img img,.ls:hover .ls-img div{transform:scale(1.07);}
.ls-b{padding:12px;}
.ls-b .tag{margin-bottom:7px;}
.ls-b h4{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ls-b .mt{font-size:11px;color:var(--t3);margin-top:6px;}

/* MAIN+SIDEBAR */
.ms{display:grid;grid-template-columns:1fr 330px;gap:32px;margin-top:48px;}
.fg{display:grid;grid-template-columns:1.2fr 1fr;grid-template-rows:auto auto;gap:18px;}
.fgm{grid-row:1/-1;background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);cursor:none;display:block;transition:transform .3s,box-shadow .3s,border-color .3s;}
.fgm:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(208,40,134,.13);border-color:rgba(208,40,134,.35);}
.fgm .th{height:220px;overflow:hidden;background:var(--elev);}
.fgm .th img{transition:transform .5s;}
.fgm:hover .th img{transform:scale(1.06);}
.fgm .bd{padding:20px;}
.fgm h3{font-size:18px;font-weight:700;line-height:1.35;margin:10px 0 10px;}
.fgm .exc{font-size:14px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;}
.fgm .mt{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3);}
.fgs{background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);cursor:none;display:flex;gap:14px;padding:14px;transition:transform .25s,border-color .25s;display:block;display:flex;}
.fgs:hover{transform:translateX(5px);border-color:rgba(208,40,134,.35);}
.fgs .st{width:88px;height:88px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--elev);}
.fgs .st img,.fgs .st div{width:100%;height:100%;transition:transform .4s;background-size:cover;background-position:top;}
.fgs:hover .st img,.fgs:hover .st div{transform:scale(1.07);}
.fgs .sb h4{font-size:14px;font-weight:600;line-height:1.4;margin:6px 0 7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.fgs .sb .mt{font-size:11px;color:var(--t3);}

/* SIDEBAR */
.sbn{background:var(--card);border-radius:var(--r);border:1px solid var(--brd);overflow:hidden;}
.sbn h4{padding:14px 18px;border-bottom:1px solid var(--brd);font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);font-family:'Space Grotesk',sans-serif;}
.si{padding:13px 18px;border-bottom:1px solid var(--brd);cursor:none;transition:background .2s;display:block;}
.si:last-child{border-bottom:none;}
.si:hover{background:var(--elev);}
.si .tag{margin-bottom:5px;}
.si p{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.si .mt{font-size:11px;color:var(--t3);margin-top:4px;}

/* ARTICLE CARDS */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.ac{background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);cursor:none;display:block;transition:transform .3s,box-shadow .3s,border-color .3s;}
.ac:hover{transform:translateY(-5px);box-shadow:0 18px 48px rgba(208,40,134,.13);border-color:rgba(208,40,134,.35);}
.ac-th{height:195px;overflow:hidden;position:relative;background:var(--elev);}
.ac-th img,.ac-th div{height:100%;width:100%;transition:transform .5s;background-size:cover;background-position:top;}
.ac:hover .ac-th img,.ac:hover .ac-th div{transform:scale(1.06);}
.ac-tg{position:absolute;top:12px;left:12px;}
.ac-b{padding:18px;}
.ac-title{font-size:16px;font-weight:600;line-height:1.4;margin:9px 0 9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ac-exc{font-size:13px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;}
.ac-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3);}
.dot{width:3px;height:3px;border-radius:50%;background:var(--t3);}
.rt{margin-left:auto;}

/* MANGA GUIDE BANNER */
.mgb{background:var(--grad);border-radius:20px;padding:48px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;cursor:none;transition:transform .3s,box-shadow .3s;margin-bottom:80px;}
.mgb:hover{transform:translateY(-3px);box-shadow:0 20px 60px rgba(208,40,134,.35);}
.mgb::before{content:'';position:absolute;right:-60px;top:-60px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.04);}
.mgb .l h2{font-size:clamp(20px,3vw,30px);color:#fff;-webkit-text-fill-color:#fff;margin-bottom:9px;}
.mgb .l p{color:rgba(255,255,255,.78);font-size:15px;max-width:420px;line-height:1.6;}
.mgb .r{z-index:1;flex-shrink:0;}

/* CALENDAR */
#cal{background:var(--bg2);}
.stabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.stab{padding:8px 20px;border-radius:50px;font-size:13px;font-weight:600;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:none;transition:all .2s;font-family:'Space Grotesk',sans-serif;}

<script>
/* ========= DATA ========= */
const AL = { seasonal:[], popular:[], hero:null, loaded:false };

const ARTICLES = {
  'solo-leveling-s2':{slug:'solo-leveling-s2',animeId:153406,title:'Solo Leveling Saison 2 : Notre review complète des 12 épisodes',subtitle:'A-1 Pictures frappe encore plus fort avec une deuxième saison qui élève le standard de l\'anime d\'action',tag:'Review',tc:'tag-review',author:'Yuki Tanaka',ai:'YT',ag:'linear-gradient(135deg,#667eea,#764ba2)',abio:'Rédacteur en chef chez INKU. Passionné d\'anime depuis 15 ans, spécialiste des adaptations de manhwa.',date:'26 mars 2025',rt:'9 min',grad:'linear-gradient(160deg,#1a0533,#3d0a6e,#8b1fa2,#D02886)',letter:'SL',score:9.2,excerpt:'A-1 Pictures livre une saison encore plus ambitieuse, avec des combats ahurissants et une montée en puissance de Sung Jinwoo qui tient toutes ses promesses.',toc:['Une progression narrative','Des combats de légende','Quelques réserves','Le verdict'],content:`<p class="lead">La première saison de Solo Leveling avait posé les bases d'une adaptation solide du célèbre manhwa coréen. Avec cette saison 2, sobrement sous-titrée "Arise from the Shadow", A-1 Pictures prouve qu'il avait gardé le meilleur pour la fin.</p><h2>Une progression narrative parfaitement rythmée</h2><p>L'arc du Château du Roi Démon constitue le cœur de cette saison, et quel cœur. Les douze épisodes se dévorent avec une fluidité remarquable, alternant entre des séquences d'action ahurissantes et des moments d'introspection qui donnent davantage de profondeur au protagoniste. Là où la saison 1 pouvait parfois sembler répétitive dans sa formule "donjon, combat, montée de niveau", la saison 2 élargit considérablement le champ des possibles.</p><p>La narration prend le temps de développer l'armée d'ombres de Jinwoo, donnant une véritable personnalité à des entités qui auraient pu rester de simples outils. Igris, Tank, Beru — chacun acquiert une dimension émotionnelle inattendue.</p><blockquote>"Solo Leveling Saison 2 ne se contente pas de répéter la formule de la première saison — elle la transcende, rivalisant avec les meilleures productions du genre."</blockquote><h2>Des combats qui redéfinissent le standard</h2><p>Le combat contre le Seigneur Démon Baran (épisode 7) restera dans les annales de l'anime d'action : une chorégraphie d'une fluidité absolue, une bande-son de Hiroyuki Sawano qui pulse dans chaque scène, et une direction artistique qui n'a rien à envier aux meilleures productions Ufotable.</p><h2>Quelques réserves mineures</h2><p>Certains épisodes de transition souffrent d'une animation légèrement en retrait. Cha Hae-In mérite clairement plus de temps d'écran.</p>`},

/* ========= ANILIST API ========= */
let imgCache = {};

async function fetchAniList() {
  const ids = [...new Set([
    ...Object.values(ARTICLES).map(a=>a.animeId),
    ...ANIMES.map(a=>a.id),
    ...MANGA_GUIDES.map(g=>g.animeId)
  ])];
  const q = `query($ids:[Int]){
    trending:Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC,isAdult:false){bannerImage coverImage{extraLarge}title{romaji}}}
    season:Page(perPage:8){media(type:ANIME,season:SPRING,seasonYear:2025,sort:POPULARITY_DESC,isAdult:false){id title{romaji}coverImage{large extraLarge color}bannerImage studios{nodes{name}}averageScore}}
    specific:Page(perPage:30){media(id_in:$ids,isAdult:false){id coverImage{large extraLarge}bannerImage}}
  }`;
  const r = await fetch('https://graphql.anilist.co',{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({query:q,variables:{ids}})
  });
  if(!r.ok) throw new Error();
  const {data} = await r.json();
  // Build cache
  (data.specific?.media||[]).forEach(m=>{imgCache[m.id]={cover:m.coverImage?.extraLarge||m.coverImage?.large,banner:m.bannerImage};});
  (data.season?.media||[]).forEach(m=>{if(!imgCache[m.id])imgCache[m.id]={cover:m.coverImage?.extraLarge||m.coverImage?.large,banner:m.bannerImage};});
  AL.seasonal = data.season?.media||[];
  AL.hero = data.trending?.media?.[0]?.bannerImage||data.trending?.media?.[0]?.coverImage?.extraLarge||null;
  AL.loaded = true;
}

function img(id, fallbackGrad, type='cover') {
  const d = imgCache[id];
  const url = type==='banner'?(d?.banner||d?.cover):d?.cover;
  if(url) return `<img src="${url}" onerror="this.style.display='none'" loading="lazy">`;
  return `<div style="background:${fallbackGrad};width:100%;height:100%"></div>`;
}
function imgStyle(id, fallbackGrad, type='cover') {
  const d = imgCache[id];
  const url = type==='banner'?(d?.banner||d?.cover):d?.cover;
  if(url) return `background-image:url(${url});background-size:cover;background-position:center;`;
  return `background:${fallbackGrad};`;
}

/* ========= ROUTER ========= */
function go(p){window.location.hash=p;}
function router(){
  const hash=window.location.hash.replace('#','')||'';
  const [page,...rest]=hash.split('/');
  document.getElementById('app').style.animation='none';
  document.getElementById('app').offsetHeight;
  document.getElementById('app').style.animation='';
  ['n0','n1','n2','n3'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
  const nm={'':'n0','articles':'n1','article':'n1','calendrier':'n2','manga-guide':'n3'};
  document.getElementById(nm[page]||'n0')?.classList.add('on');
  window.scrollTo(0,0);
  if(!page)rHome();
  else if(page==='articles')rArticles();
  else if(page==='article')rArticle(rest[0]);
  else if(page==='calendrier')rCalendrier();
  else if(page==='manga-guide')rMangaGuide();
  else rHome();
  rFooter();
  initPage();
}
window.addEventListener('hashchange',router);

function updProg(){
  const b=document.getElementById('prog');

  const tot=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight)-window.innerHeight;
  b.style.width=Math.min((window.scrollY/tot)*100,100)+'%';
}

/* ========= INIT ========= */
function initPage(){
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('on');});},{threshold:.07,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
  document.querySelectorAll('a,button,.ac,.anc,.mgc,.ccat,.ls,.fgm,.fgs,.si,.ri,.ed-hero,.mgb').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.getElementById('cr').classList.add('h'));
    el.addEventListener('mouseleave',()=>document.getElementById('cr').classList.remove('h'));
  });
  document.querySelectorAll('.stab,.mf').forEach(t=>{t.addEventListener('click',function(){
    this.closest('.stabs,.mgf').querySelectorAll('.stab,.mf').forEach(x=>x.classList.remove('on'));
    this.classList.add('on');
  });});
  window.addEventListener('scroll',()=>{document.getElementById('hdr').classList.toggle('sc',window.scrollY>20);},{passive:true});
}

function initPts(){
  const c=document.getElementById('pts');if(!c)return;
  const colors=['#FF3399','#D02886','#9966CC','#FF5FB3'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div');p.className='pt';
    const sz=Math.random()*4+2,col=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col};box-shadow:0 0 ${sz*3}px ${col};--d:${(Math.random()*8+5).toFixed(1)}s;--tx:${(Math.random()*80-40).toFixed(0)}px;--ty:-${(Math.random()*100+40).toFixed(0)}px;--op:${(Math.random()*.5+.25).toFixed(2)};animation-delay:-${(Math.random()*10).toFixed(1)}s;`;
    c.appendChild(p);
  }
}

/* CURSOR */
const cd=document.getElementById('cd'),cr=document.getElementById('cr');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.transform=`translate(${mx-5}px,${my-5}px)`;});
(function aR(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;cr.style.transform=`translate(${rx-20}px,${ry-20}px)`;requestAnimationFrame(aR);})();

}
